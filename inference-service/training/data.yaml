# YOLOv8 dataset config for the Roboflow Construction Site Safety dataset.
# Download from Kaggle: snehilsanyal/construction-site-safety-image-dataset-roboflow
# (CC BY 4.0 — credit Roboflow Universe Projects). 2,801 images, YOLOv8 format.
#
# Expected layout after unzip:
#   datasets/css-data/{train,valid,test}/{images,labels}
path: ../datasets/css-data
train: train/images
val: valid/images
test: test/images

nc: 10
names:
  0: Hardhat
  1: Mask
  2: NO-Hardhat
  3: NO-Mask
  4: NO-Safety Vest
  5: Person
  6: Safety Cone
  7: Safety Vest
  8: machinery
  9: vehicle
